<!DOCTYPE html>
<html>
<head>
    <title>Weekly Planner</title>
    <link rel="stylesheet" href="./css/styles.css">
</head>
<body>

    <div id="app">

        <div id="home-view">

            <h1>Weekly Planner</h1>

            <div id="days-grid"></div>

        </div>

        <div id="day-view" class="hidden">

            <button id="back-btn">
                ← Back
            </button>

            <h1 id="day-title"></h1>

            <textarea
                id="notes"
                placeholder="Enter notes..."
            ></textarea>

            <button id="save-btn">
                Save
            </button>

        </div>

    </div>

    <script src="./js/renderer.js"></script>

</body>
</html>
